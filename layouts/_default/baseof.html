<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* --- Theme Variables --- */
    :root, [data-theme="light"] {
      --bg: #ffffff;
      --bg-secondary: #fafafa;
      --text: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border: #e5e5e5;
      --border-light: #f0f0f0;
      --link: #1a1a1a;
      --link-hover: #555;
      --code-bg: #f5f5f5;
      --tag-ai-bg: #eff6ff; --tag-ai-text: #1d4ed8;
      --tag-data-bg: #f0fdf4; --tag-data-text: #166534;
      --tag-lifestyle-bg: #faf5ff; --tag-lifestyle-text: #7e22ce;
      --tag-recipes-bg: #fff7ed; --tag-recipes-text: #c2410c;
    }
    [data-theme="dark"] {
      --bg: #161616;
      --bg-secondary: #1e1e1e;
      --text: #e0e0e0;
      --text-secondary: #999;
      --text-tertiary: #666;
      --border: #2a2a2a;
      --border-light: #222;
      --link: #e0e0e0;
      --link-hover: #bbb;
      --code-bg: #2a2a2a;
      --tag-ai-bg: #1e3a5f; --tag-ai-text: #93c5fd;
      --tag-data-bg: #14532d; --tag-data-text: #86efac;
      --tag-lifestyle-bg: #3b0764; --tag-lifestyle-text: #d8b4fe;
      --tag-recipes-bg: #431407; --tag-recipes-text: #fdba74;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      transition: background 0.2s, color 0.2s;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); }

    /* --- Header --- */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
    }
    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-logo {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .site-logo:hover { opacity: 0.8; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header-right a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .header-right a:hover { color: var(--text); }

    /* Theme toggle */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .theme-toggle:hover { border-color: var(--text-secondary); }
    .theme-toggle svg { width: 16px; height: 16px; }

    /* --- Main Content --- */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* --- Section Headers --- */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-tertiary);
      margin-bottom: 20px;
      padding-top: 32px;
    }

    /* --- Hero Featured Article --- */
    .hero-feature {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .hero-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    @media (min-width: 768px) { .hero-title { font-size: 42px; } }
    .hero-title a { color: var(--text); }
    .hero-title a:hover { color: var(--text-secondary); }
    .hero-excerpt {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 12px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero-feature .article-tag { margin-bottom: 14px; }

    /* --- Secondary Featured Articles --- */
    .secondary-features {
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .secondary-feature {
      padding: 20px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .secondary-feature:last-child { border-bottom: none; }
    .secondary-feature h2 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .secondary-feature h2 a { color: var(--text); }
    .secondary-feature h2 a:hover { color: var(--text-secondary); }

    /* --- Two-Column: Latest | Trending --- */
    .two-col {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 0 8px;
    }
    @media (min-width: 640px) {
      .two-col {
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }
      .col-left {
        border-right: 1px solid var(--border-light);
        padding-right: 24px;
      }
      .col-right {
        padding-left: 24px;
      }
    }

    /* --- Compact Card (used in Latest, Trending, Category sections) --- */
    .compact-card {
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 15px;
      line-height: 1.4;
    }
    .compact-card:last-child { border-bottom: none; }
    .compact-card a {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 600;
      color: var(--text);
    }
    .compact-card a:hover { color: var(--text-secondary); }
    .compact-card .article-tag { margin-bottom: 4px; font-size: 10px; }

    /* --- Category Sections --- */
    .category-section {
      padding: 24px 0 8px;
      border-bottom: 1px solid var(--border);
    }
    .category-section:last-child { border-bottom: none; }
    .category-section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .see-all {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
    }
    .see-all:hover { color: var(--text); }

    /* --- Article Cards (text-only, gloss style) --- */
    .article-card {
      padding: 20px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .article-card:last-child { border-bottom: none; }
    .article-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 3px;
      margin-bottom: 8px;
    }
    .tag-ai { background: var(--tag-ai-bg); color: var(--tag-ai-text); }
    .tag-data { background: var(--tag-data-bg); color: var(--tag-data-text); }
    .tag-lifestyle { background: var(--tag-lifestyle-bg); color: var(--tag-lifestyle-text); }
    .tag-my-recipes, .tag-recipes { background: var(--tag-recipes-bg); color: var(--tag-recipes-text); }
    .article-card h3 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .article-card h3 a { color: var(--text); }
    .article-card h3 a:hover { color: var(--text-secondary); }
    .article-excerpt {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .article-byline {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
    }

    /* --- Featured Article (hero) --- */
    .featured-article {
      padding: 32px 0;
      border-bottom: 1px solid var(--border);
    }
    .featured-article .article-tag {
      margin-bottom: 12px;
    }
    .featured-article h2 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    @media (min-width: 768px) {
      .featured-article h2 { font-size: 38px; }
    }
    .featured-article h2 a { color: var(--text); }
    .featured-article h2 a:hover { color: var(--text-secondary); }
    .featured-article .article-excerpt {
      font-size: 17px;
      line-height: 1.6;
    }

    /* --- Single Post --- */
    .post-header { margin-bottom: 32px; padding-top: 32px; }
    .post-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    @media (min-width: 768px) { .post-title { font-size: 42px; } }
    .post-meta {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .post-content {
      max-width: 760px;
      font-size: 17px;
      line-height: 1.8;
    }
    .post-content h1 { font-family: 'Newsreader', Georgia, serif; font-size: 30px; font-weight: 700; margin: 1.5em 0 0.5em; }
    .post-content h2 { font-family: 'Newsreader', Georgia, serif; font-size: 26px; font-weight: 700; margin: 1.4em 0 0.5em; }
    .post-content h3 { font-family: 'Newsreader', Georgia, serif; font-size: 22px; font-weight: 700; margin: 1.3em 0 0.5em; }
    .post-content p { margin-bottom: 1em; }
    .post-content ul, .post-content ol { margin-bottom: 1em; padding-left: 1.5em; }
    .post-content li { margin-bottom: 0.3em; }
    .post-content blockquote {
      border-left: 3px solid var(--border);
      padding-left: 20px;
      margin: 1.5em 0;
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      color: var(--text-secondary);
      font-size: 19px;
    }
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1.5em 0;
    }
    .post-content a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }
    .post-content a:hover { color: var(--text-secondary); }
    .post-content strong { font-weight: 700; }
    .post-content em { font-style: italic; }
    .post-content code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    .post-content pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1em;
    }
    .post-content pre code { background: none; padding: 0; }

    /* --- Photo Layout --- */
    .photo-hero {
      width: 100%;
      max-height: 60vh;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
      border-radius: 4px;
    }

    /* --- Recipe Layout --- */
    .recipe-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      max-width: 760px;
    }
    @media (min-width: 768px) { .recipe-grid { grid-template-columns: 260px 1fr; } }
    .recipe-sidebar {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      padding: 24px;
      border-radius: 4px;
      height: fit-content;
    }
    @media (min-width: 768px) { .recipe-sidebar { position: sticky; top: 80px; } }
    .recipe-sidebar h3 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .recipe-sidebar ul { list-style: none; padding: 0; }
    .recipe-sidebar li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px;
    }
    .recipe-sidebar li:last-child { border-bottom: none; }
    .recipe-instructions { counter-reset: step; }
    .recipe-instructions h2 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* --- Back Link --- */
    .back-link {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-decoration: none;
      margin-bottom: 8px;
      padding-top: 24px;
    }
    .back-link:hover { color: var(--text); }

    /* --- Subscribe Page --- */
    .subscribe-wrapper {
      display: flex;
      justify-content: center;
      padding: 60px 0;
    }
    .subscribe-card {
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      text-align: center;
    }
    .subscribe-card h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subscribe-card .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .subscribe-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
      margin: 0 auto;
    }
    .subscribe-form input {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .subscribe-form input:focus { border-color: var(--text-secondary); }
    .subscribe-form input::placeholder { color: var(--text-tertiary); }
    .subscribe-form button {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: var(--text);
      color: var(--bg);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .subscribe-form button:hover { opacity: 0.85; }
    .subscribe-privacy {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 16px;
    }
    .subscribe-success { display: none; font-size: 16px; margin-top: 20px; color: var(--text); }
    .subscribe-home-link { display: none; margin-top: 12px; font-size: 14px; }
    .subscribe-home-link a { color: var(--text-secondary); text-decoration: underline; }

    /* --- Footer --- */
    .site-footer {
      margin-top: 64px;
      padding: 32px 0;
      border-top: 1px solid var(--border);
    }
    .footer-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .footer-links { display: flex; gap: 16px; }
    .footer-links a { color: var(--text-tertiary); font-size: 13px; }
    .footer-links a:hover { color: var(--text); }

    /* --- Mobile --- */
    @media (max-width: 600px) {
      .featured-article h2 { font-size: 26px; }
      .post-title { font-size: 28px; }
      .footer-inner { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo">{{ .Site.Title }}</a>
      <div class="header-right">
        <a href="/blog/">Blog</a>
        <a href="/about/">About</a>
        <a href="/subscribe/">Subscribe</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>{{ .Site.Title }}, {{ now.Year }}</span>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/subscribe/">Subscribe</a>
      </div>
    </div>
  </footer>

  <script>
    // Theme toggle: light → dark → system
    function toggleTheme() {
      const html = document.documentElement;
      const current = localStorage.getItem('theme') || 'light';
      const next = current === 'light' ? 'dark' : current === 'dark' ? 'system' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }
    function applyTheme(pref) {
      const html = document.documentElement;
      if (pref === 'system') {
        const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        html.setAttribute('data-theme', sys);
      } else {
        html.setAttribute('data-theme', pref);
      }
      updateIcon(pref);
    }
    function updateIcon(pref) {
      const icon = document.getElementById('theme-icon');
      if (pref === 'dark') {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
      } else if (pref === 'system') {
        icon.innerHTML = '<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      }
    }
    (function() {
      const saved = localStorage.getItem('theme') || 'light';
      applyTheme(saved);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (localStorage.getItem('theme') === 'system') applyTheme('system');
      });
    })();
  </script>
  <script>
    fetch('/api/page-views', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: location.pathname })
    }).catch(() => {});
  </script>
</body>
</html>
