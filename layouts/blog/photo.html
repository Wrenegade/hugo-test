{{ define "main" }}
<article>
  <a href="/blog/" class="back-link">&larr; Back to posts</a>
  {{ with .Params.image }}
  <img class="photo-hero" src="{{ . }}" alt="{{ $.Title }}">
  {{ end }}
  <div class="post-header" style="text-align: center;">
    {{ with .Params.categories }}
    <div style="margin-bottom: 12px;">
      {{ range . }}<span class="badge badge-{{ lower . }}">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="post-meta">{{ .Date.Format "January 2, 2006" }}</p>
  </div>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
